name: FreeRDP-Zorin
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Desktop and RDP
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies xrdp
          # Fix for the password error: change current user password
          echo "$USER:Zorin123" | sudo chpasswd
          echo xfce4-session > ~/.xsession
          sudo systemctl enable xrdp
          sudo service xrdp start
      - name: Setup Cloudflare
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared tunnel --url tcp://localhost:3389 --token ${{ secrets.CLOUDFLARE_AUTH_TOKEN }} &
      - name: Keep Alive
        run: sleep 21600
