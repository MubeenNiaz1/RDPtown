name: FreeRDP-Zorin
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Desktop and RDP
        run: |
          sudo apt update
          # Install XFCE and XRDP
          sudo apt install -y xfce4 xfce4-goodies xrdp
          
          # Set password for the correct 'runner' user
          echo "runner:Zorin123" | sudo chpasswd
          
          # Configure session and permissions
          echo xfce4-session > ~/.xsession
          sudo sed -i 's/allowed_users=console/allowed_users=anybody/' /etc/X11/Xwrapper.config
          
          # Start service and wait for it to settle
          sudo systemctl enable xrdp
          sudo service xrdp restart
          sleep 10

      - name: Setup Cloudflare Tunnel
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          # Use TCP mode to avoid the 'Help' menu loop
          cloudflared tunnel --url tcp://localhost:3389 &

      - name: Keep Alive (6 Hours)
        run: sleep 21600
