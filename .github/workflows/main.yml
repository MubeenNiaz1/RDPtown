name: FreeRDP-Zorin
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Desktop and Force-Display
        run: |
          sudo apt update
          # Install Desktop, RDP, and a virtual display buffer
          sudo apt install -y xfce4 xfce4-goodies xrdp xserver-xorg-video-dummy
          
          # Set the password
          echo "runner:Zorin123" | sudo chpasswd
          
          # Force the session to use XFCE
          echo "xfce4-session" > ~/.xsession
          
          # RELAX SECURITY: Allow any user and disable encryption requirements that crash Remmina
          sudo sed -i 's/allowed_users=console/allowed_users=anybody/' /etc/X11/Xwrapper.config
          sudo sed -i 's/crypto_level=high/crypto_level=low/' /etc/xrdp/xrdp.ini
          
          sudo systemctl enable xrdp
          sudo service xrdp restart

      - name: Setup Cloudflare
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          # Force TCP tunnel
          cloudflared tunnel --url tcp://localhost:3389 &

      - name: Keep Alive
        run: sleep 21600
