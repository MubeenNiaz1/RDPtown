name: FreeRDP-Zorin
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Desktop and RDP
        run: |
          sudo apt update
          # Install XFCE Desktop and XRDP Server (The "GUI")
          sudo apt install -y xfce4 xfce4-goodies xrdp
          # Set the password for the 'runner' user to 'Zorin123'
          echo "$USER:Zorin123" | sudo chpasswd
          echo xfce4-session > ~/.xsession
          sudo systemctl enable xrdp
          sudo service xrdp start

      - name: Setup Cloudflare Tunnel
        run: |
          # Download and install Cloudflared
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          # Start the tunnel specifically for the RDP port (3389)
          # We use --url tcp://... to prevent the 'Help' menu error
          cloudflared tunnel --url tcp://localhost:3389 &

      - name: Keep Alive (6 Hours)
        run: sleep 21600
